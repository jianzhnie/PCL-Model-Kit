<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" width="1600" height="1100" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <filter id="shadowLight" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1.5" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1100" fill="url(#bgGrad)" rx="8"/>

  <!-- Title -->
  <text x="800" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">LongCat-Flash 架构：恒等层插入非函数保持性分析</text>
  <text x="800" y="62" text-anchor="middle" font-size="13" fill="#64748b">LongCat-Flash-Lite (14层/256专家) &amp; LongCat-Flash-Chat (28层/512专家) — 共享相同架构</text>

  <!-- ============================================================ -->
  <!-- LEFT PANEL: Standard Transformer -->
  <!-- ============================================================ -->

  <rect x="30" y="80" width="470" height="500" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="30" y="80" width="470" height="36" rx="10" fill="#2563eb"/>
  <rect x="30" y="106" width="470" height="10" fill="#2563eb"/>
  <text x="265" y="103" text-anchor="middle" font-size="14" font-weight="bold" fill="white">标准 Transformer Decoder Layer（理论假设）</text>

  <!-- Standard: Sublayer 1 -->
  <rect x="55" y="130" width="420" height="82" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="70" y="152" font-size="12" font-weight="bold" fill="#1e40af">子层 1: 注意力</text>
  <text x="70" y="170" font-size="11" fill="#475569" font-family="monospace">residual = x</text>
  <text x="70" y="187" font-size="11" fill="#475569" font-family="monospace">h = Attention(LN(x))</text>
  <text x="70" y="204" font-size="11" fill="#475569" font-family="monospace">x = residual + h       → x + Attn(LN(x))</text>

  <!-- Standard: Sublayer 2 -->
  <rect x="55" y="222" width="420" height="82" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="70" y="244" font-size="12" font-weight="bold" fill="#166534">子层 2: FFN / MLP</text>
  <text x="70" y="262" font-size="11" fill="#475569" font-family="monospace">residual = x</text>
  <text x="70" y="279" font-size="11" fill="#475569" font-family="monospace">h = FFN(LN(x))</text>
  <text x="70" y="296" font-size="11" fill="#475569" font-family="monospace">x = residual + h       → x + FFN(LN(x))</text>

  <!-- Standard: Identity explanation -->
  <rect x="55" y="320" width="420" height="110" rx="6" fill="#fefce8" stroke="#fde047" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="70" y="342" font-size="12" font-weight="bold" fill="#854d0e">恒等层初始化（置零 o_proj + down_proj）后：</text>
  <text x="70" y="362" font-size="11" fill="#92400e" font-family="monospace">子层 1: x = x + Wᵒ·0 = x + 0 = x</text>
  <text x="70" y="380" font-size="11" fill="#92400e" font-family="monospace">子层 2: x = x + Wᵈᵒʷⁿ·0 = x + 0 = x</text>
  <text x="70" y="402" font-size="12" font-weight="bold" fill="#16a34a">✅ 输出 = 输入（严格恒等）</text>
  <text x="70" y="420" font-size="11" fill="#64748b">cos_sim = 1.0, max_abs_diff = 0</text>

  <!-- Standard: residual arrows -->
  <line x1="110" y1="212" x2="110" y2="222" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="170" y1="212" x2="430" y2="212" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="430" y1="212" x2="430" y2="314" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="430" y1="314" x2="170" y2="304" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ============================================================ -->
  <!-- CENTER PANEL: LongCat-Flash Architecture -->
  <!-- ============================================================ -->

  <rect x="530" y="80" width="540" height="500" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="530" y="80" width="540" height="36" rx="10" fill="#dc2626"/>
  <rect x="530" y="106" width="540" height="10" fill="#dc2626"/>
  <text x="800" y="103" text-anchor="middle" font-size="14" font-weight="bold" fill="white">LongCat-Flash Decoder Layer（实际架构）</text>

  <!-- LongCat: Sublayer 1 -->
  <rect x="555" y="130" width="490" height="72" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="570" y="150" font-size="12" font-weight="bold" fill="#1e40af">子层 1: 注意力头 0</text>
  <text x="570" y="167" font-size="10.5" fill="#475569" font-family="monospace">residual = x</text>
  <text x="570" y="183" font-size="10.5" fill="#475569" font-family="monospace">x = residual + Attn₀(LN₀(x))        o_proj₀ 可置零</text>

  <!-- LongCat: Sublayer 2 -->
  <rect x="555" y="212" width="490" height="86" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="570" y="232" font-size="12" font-weight="bold" fill="#166534">子层 2: 共享 MLP 0 + MoE 路由（快捷连接源）</text>
  <text x="570" y="250" font-size="10.5" fill="#475569" font-family="monospace">residual = x</text>
  <text x="570" y="267" font-size="10.5" fill="#475569" font-family="monospace">x = residual + MLP₀(LN₁(x))         down_proj 可置零</text>
  <text x="570" y="284" font-size="10.5" fill="#dc2626" font-family="monospace" font-weight="bold">shortcut = MoE(LN₁(x))               ⚠ 依赖 Router 路由!</text>

  <!-- LongCat: Sublayer 3 -->
  <rect x="555" y="308" width="490" height="72" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="570" y="328" font-size="12" font-weight="bold" fill="#1e40af">子层 3: 注意力头 1</text>
  <text x="570" y="345" font-size="10.5" fill="#475569" font-family="monospace">residual = x</text>
  <text x="570" y="361" font-size="10.5" fill="#475569" font-family="monospace">x = residual + Attn₁(LN₂(x))        o_proj₁ 可置零</text>

  <!-- LongCat: Sublayer 4 -->
  <rect x="555" y="390" width="490" height="80" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="570" y="410" font-size="12" font-weight="bold" fill="#166534">子层 4: 共享 MLP 1 + 快捷连接汇入点</text>
  <text x="570" y="428" font-size="10.5" fill="#475569" font-family="monospace">residual = x</text>
  <text x="570" y="445" font-size="10.5" fill="#475569" font-family="monospace">x = residual + MLP₁(LN₃(x)) + shortcut  ← 快捷值在此注入!</text>
  <text x="570" y="462" font-size="10.5" fill="#dc2626" font-family="monospace" font-weight="bold">shortcut ≠ 0, 且不经过任何可置零权重!</text>

  <!-- Shortcut path visualization -->
  <path d="M 570,278 L 535,278 L 535,435 L 555,435" fill="none" stroke="#ea580c" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="520" y="360" font-size="10" fill="#ea580c" font-weight="bold" transform="rotate(-90,520,360)">shortcut 绕过子层 3</text>

  <!-- ============================================================ -->
  <!-- RIGHT PANEL: Identity Failure Analysis -->
  <!-- ============================================================ -->

  <rect x="1100" y="80" width="470" height="500" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="1100" y="80" width="470" height="36" rx="10" fill="#ea580c"/>
  <rect x="1100" y="106" width="470" height="10" fill="#ea580c"/>
  <text x="1335" y="103" text-anchor="middle" font-size="14" font-weight="bold" fill="white">恒等层初始化后：非恒等的原因</text>

  <!-- Step by step trace -->
  <rect x="1125" y="130" width="420" height="55" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="1140" y="150" font-size="11" font-weight="bold" fill="#991b1b">输入: x (来自上一层输出)</text>
  <text x="1140" y="167" font-size="10.5" fill="#7f1d1d" font-family="monospace">假设上一层的 hidden_states = x</text>
  <text x="1140" y="180" font-size="10.5" fill="#7f1d1d" font-family="monospace">期望：恒等层输出 = x（保持不变）</text>

  <!-- Sublayer 1 trace -->
  <rect x="1125" y="195" width="420" height="40" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="1140" y="213" font-size="10.5" fill="#1e40af" font-family="monospace">子层 1: Attn₀ → o_proj₀=0 → 输出 0 → x = x+0 ✓</text>
  <text x="1140" y="230" font-size="10" fill="#64748b">✅ 残差 = x（无变化）</text>

  <!-- Sublayer 2 trace -->
  <rect x="1125" y="245" width="420" height="65" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="1140" y="263" font-size="10.5" fill="#166534" font-family="monospace">子层 2: MLP₀ → down_proj=0 → 输出 0 → x = x+0 ✓</text>
  <text x="1140" y="280" font-size="10.5" fill="#166534" font-family="monospace">        shortcut = MoE(LN₁(x))</text>
  <text x="1140" y="298" font-size="10.5" fill="#dc2626" font-family="monospace" font-weight="bold">        ⚠ shortcut 是 Router × Σ gate_i · expert_i(x)</text>
  <text x="1140" y="308" font-size="10" fill="#dc2626">        expert.down_proj 虽为 0 但路由权重非零!</text>

  <!-- Sublayer 3 trace -->
  <rect x="1125" y="320" width="420" height="40" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="1140" y="338" font-size="10.5" fill="#1e40af" font-family="monospace">子层 3: Attn₁ → o_proj₁=0 → 输出 0 → x = x+0 ✓</text>
  <text x="1140" y="355" font-size="10" fill="#64748b">✅ 残差 = x（无变化）</text>

  <!-- Sublayer 4 trace — THE PROBLEM -->
  <rect x="1125" y="370" width="420" height="72" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="1140" y="390" font-size="10.5" fill="#991b1b" font-family="monospace" font-weight="bold">子层 4: MLP₁ → down_proj=0 → 输出 0</text>
  <text x="1140" y="408" font-size="10.5" fill="#991b1b" font-family="monospace" font-weight="bold">        x = x + 0 + shortcut</text>
  <text x="1140" y="428" font-size="10.5" fill="#dc2626" font-family="monospace" font-weight="bold">        shortcut ≠ 0 → x ≠ 输入！ ❌</text>
  <text x="1140" y="440" font-size="10" fill="#991b1b">原因: shortcut 在子层 2 计算，绕过所有置零操作</text>

  <!-- Final result -->
  <rect x="1125" y="455" width="420" height="42" rx="6" fill="#dc2626" opacity="0.1"/>
  <text x="1335" y="475" text-anchor="middle" font-size="13" font-weight="bold" fill="#dc2626">输出 = x + shortcut ≠ x → 函数非保持!</text>

  <!-- ============================================================ -->
  <!-- BOTTOM: Verification & Impact Summary -->
  <!-- ============================================================ -->

  <rect x="30" y="600" width="1540" height="230" rx="10" fill="white" filter="url(#shadow)"/>

  <!-- Verification results section -->
  <rect x="50" y="620" width="480" height="190" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="290" y="645" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">🔬 双重验证结果对比</text>

  <text x="70" y="672" font-size="11" font-weight="bold" fill="#16a34a">✅ verify_expanded_weights.py（权重结构）</text>
  <text x="80" y="690" font-size="10.5" fill="#475569">• 检查所有 safetensors 张量值的逐位匹配</text>
  <text x="80" y="707" font-size="10.5" fill="#475569">• o_proj / down_proj 全部正确归零</text>
  <text x="80" y="724" font-size="10.5" fill="#475569">• 保留层权重与原始层 bit-exact 一致</text>
  <text x="80" y="744" font-size="10.5" fill="#16a34a" font-weight="bold">结果: 全部通过 ✓</text>

  <text x="70" y="774" font-size="11" font-weight="bold" fill="#dc2626">❌ verify_model_output.py（功能输出）</text>
  <text x="80" y="792" font-size="10.5" fill="#475569">• 加载完整模型进行前向推理比较 logits</text>
  <text x="80" y="808" font-size="10.5" fill="#dc2626" font-weight="bold">结果: exit_code=1 — 输出不匹配!</text>

  <!-- Impact details section -->
  <rect x="550" y="620" width="460" height="190" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="780" y="645" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">📊 定量影响分析</text>

  <rect x="570" y="660" width="420" height="32" rx="4" fill="#eff6ff"/>
  <text x="585" y="681" font-size="11" fill="#1e40af" font-family="monospace">Lite 14→18 (+4层): max_abs_diff ≈ 15, cos_sim ≈ 0.997</text>
  <rect x="570" y="698" width="420" height="32" rx="4" fill="#fef2f2"/>
  <text x="585" y="719" font-size="11" fill="#991b1b" font-family="monospace">Lite 14→28 (+14层): max_abs_diff ≈ 30, cos_sim ≈ 0.964</text>
  <rect x="570" y="736" width="420" height="32" rx="4" fill="#fefce8"/>
  <text x="585" y="757" font-size="11" fill="#854d0e" font-family="monospace">Chat 28→32 (+4层): 架构相同，理论结果一致</text>

  <text x="585" y="788" font-size="11" fill="#64748b">差异 ≈ 每恒等层贡献 2–3 max_abs_diff</text>
  <text x="585" y="805" font-size="11" fill="#64748b">cos_sim > 0.96 说明方向高度相关，可作训练初始化</text>

  <!-- Legend section -->
  <rect x="1030" y="620" width="520" height="190" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="1290" y="645" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">🔑 关键结论</text>

  <text x="1050" y="675" font-size="11" fill="#475569">1. LongCat-Flash 的双并行注意力 + 双 MLP + shortcut</text>
  <text x="1060" y="693" font-size="11" fill="#475569">架构使标准的 identity layer insertion 无法保证函数保持</text>

  <text x="1050" y="718" font-size="11" fill="#475569">2. 权重验证通过 ≠ 功能验证通过</text>
  <text x="1060" y="736" font-size="11" fill="#475569">两种验证方式互补，缺一不可</text>

  <text x="1050" y="761" font-size="11" fill="#475569">3. 尽管不严格函数保持，cos_sim 保持在高位</text>
  <text x="1060" y="779" font-size="11" fill="#475569">(0.96–0.99)，可作为后续训练的良好初始化</text>

  <!-- ============================================================ -->
  <!-- BOTTOM BAR: Model comparison -->
  <!-- ============================================================ -->

  <rect x="30" y="850" width="1540" height="120" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="800" y="875" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">两个受影响的 LongCat-Flash 模型</text>

  <!-- Lite model card -->
  <rect x="60" y="890" width="720" height="65" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="80" y="910" font-size="13" font-weight="bold" fill="#1e40af">LongCat-Flash-Lite</text>
  <text x="80" y="930" font-size="11" fill="#475569">hidden_size=3072 | layers=14 | experts=256 (routed) + 128 (zero) | topk=12 | vocab=131,072</text>
  <text x="80" y="948" font-size="11" fill="#64748b">原始 ~147 GB → 扩展 +4层 ~159 GB | +14层 ~211 GB</text>

  <!-- Chat model card -->
  <rect x="800" y="890" width="740" height="65" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="820" y="910" font-size="13" font-weight="bold" fill="#166534">LongCat-Flash-Chat</text>
  <text x="820" y="930" font-size="11" fill="#475569">hidden_size=6144 | layers=28 | experts=512 (routed) + 256 (zero) | topk=12 | vocab=131,072</text>
  <text x="820" y="948" font-size="11" fill="#64748b">原始 ~562 GB → 扩展 +4层 ~1.3 TB | 联合扩展 ~2.5 TB</text>

  <!-- Footer -->
  <text x="800" y="1000" text-anchor="middle" font-size="10" fill="#94a3b8">PCL-Model-Kit — docs/longcat_flash_architecture.svg — 2026-06-29</text>

  <!-- Shortcut legend -->
  <rect x="30" y="1015" width="370" height="65" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="50" y="1037" font-size="11" font-weight="bold" fill="#c2410c">图例</text>
  <line x1="50" y1="1055" x2="100" y2="1055" stroke="#ea580c" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="110" y="1059" font-size="10" fill="#c2410c">shortcut 跨子层连接（绕过置零）</text>
  <text x="50" y="1074" font-size="10" fill="#64748b">蓝色=注意力子层 | 绿色=MLP子层 | 黄色=恒等假设 | 红色=故障点</text>

</svg>