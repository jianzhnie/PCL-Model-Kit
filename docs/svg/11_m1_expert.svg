<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#64748B"/></marker>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#EA580C"/></marker>
    <linearGradient id="ig" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF7ED"/><stop offset="100%" stop-color="#FFEDD5"/></linearGradient>
    <pattern id="noise" width="6" height="6" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r=".7" fill="#EF4444" opacity=".5"/><circle cx="4" cy="4" r=".7" fill="#EF4444" opacity=".5"/></pattern>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity=".08"/></filter>
  </defs>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">M1: Expert Upcycling — Duplicate Experts, Keep Top-K</text>
  <line x1="140" y1="44" x2="760" y2="44" stroke="#CBD5E1"/>

  <!-- ==================== Section 1: Original MoE ==================== -->
  <text x="450" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Original MoE Layer — E Routed Experts, Top-K</text>

  <rect x="40" y="88" width="100" height="34" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="90" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Hidden h</text>
  <line x1="140" y1="105" x2="172" y2="105" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="174" y="84" width="110" height="42" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="229" y="103" text-anchor="middle" font-size="11" font-weight="600" fill="#5B21B6">Router</text>
  <text x="229" y="118" text-anchor="middle" font-size="9" fill="#7C3AED">[E × d]</text>
  <line x1="284" y1="105" x2="316" y2="105" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="300" y="96" text-anchor="middle" font-size="9" fill="#7C3AED" font-weight="600">Top-K</text>

  <rect x="318" y="84" width="390" height="42" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <g transform="translate(326,90)">
    <rect x="0" y="0" width="22" height="30" rx="3" fill="#3B82F6" stroke="#1D4ED8"/><text x="11" y="20" text-anchor="middle" font-size="7" fill="#fff" font-weight="600">E0</text>
    <rect x="26" y="0" width="22" height="30" rx="3" fill="#DBEAFE" stroke="#93C5FD" stroke-width=".8"/><text x="37" y="20" text-anchor="middle" font-size="7" fill="#6B7280">E1</text>
    <rect x="52" y="0" width="22" height="30" rx="3" fill="#3B82F6" stroke="#1D4ED8"/><text x="63" y="20" text-anchor="middle" font-size="7" fill="#fff" font-weight="600">E2</text>
    <rect x="78" y="0" width="22" height="30" rx="3" fill="#DBEAFE" stroke="#93C5FD" stroke-width=".8"/><text x="89" y="20" text-anchor="middle" font-size="7" fill="#6B7280">E3</text>
    <text x="114" y="19" font-size="11" fill="#94A3B8">···</text>
    <rect x="130" y="0" width="22" height="30" rx="3" fill="#3B82F6" stroke="#1D4ED8"/><text x="141" y="20" text-anchor="middle" font-size="6" fill="#fff" font-weight="600">E99</text>
    <text x="166" y="19" font-size="11" fill="#94A3B8">···</text>
    <rect x="182" y="0" width="22" height="30" rx="3" fill="#DBEAFE" stroke="#93C5FD" stroke-width=".8"/><text x="193" y="20" text-anchor="middle" font-size="5.5" fill="#6B7280">E510</text>
    <rect x="208" y="0" width="22" height="30" rx="3" fill="#3B82F6" stroke="#1D4ED8"/><text x="219" y="20" text-anchor="middle" font-size="5.5" fill="#fff" font-weight="600">E511</text>
    <rect x="238" y="0" width="126" height="30" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width=".8"/>
    <text x="301" y="13" text-anchor="middle" font-size="7.5" fill="#94A3B8">Zero Experts</text>
    <text x="301" y="25" text-anchor="middle" font-size="7" fill="#94A3B8">×256 (identity)</text>
  </g>
  <text x="513" y="80" text-anchor="middle" font-size="9" fill="#94A3B8">512 routed (dark = Top-K selected)</text>
  <line x1="708" y1="105" x2="740" y2="105" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
  <circle cx="760" cy="105" r="14" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/><text x="760" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">Σ</text>
  <line x1="774" y1="105" x2="806" y2="105" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="830" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">out</text>

  <!-- ==================== Section 2: Expansion Process ==================== -->
  <line x1="40" y1="145" x2="860" y2="145" stroke="#CBD5E1" stroke-dasharray="6,4"/>
  <rect x="365" y="156" width="170" height="32" rx="16" fill="#EA580C"/><text x="450" y="177" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">2× Expert Upcycling</text>
  <text x="450" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Expansion — Three Synchronized Dimensions</text>

  <rect x="30" y="226" width="260" height="190" rx="10" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="160" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">① Expert Weight Duplication</text>
  <rect x="55" y="264" width="90" height="48" rx="5" fill="#3B82F6" filter="url(#sh)"/><text x="100" y="284" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Expert 0</text><text x="100" y="300" text-anchor="middle" font-size="8" fill="#BFDBFE">gate / up / down</text>
  <line x1="145" y1="283" x2="168" y2="270" stroke="#64748B" stroke-width="1.2" marker-end="url(#ah)"/>
  <line x1="145" y1="293" x2="168" y2="306" stroke="#EA580C" stroke-width="1.2" marker-end="url(#ao)"/>
  <rect x="170" y="258" width="100" height="24" rx="4" fill="#3B82F6"/><text x="220" y="275" text-anchor="middle" font-size="9" fill="#fff">E0 (keep)</text>
  <rect x="170" y="294" width="100" height="24" rx="4" fill="url(#ig)" stroke="#F97316" stroke-width="1.5"/><text x="220" y="311" text-anchor="middle" font-size="9" fill="#C2410C" font-weight="600">E0' (copy)</text>
  <rect x="170" y="328" width="100" height="20" rx="4" fill="#FEE2E2" stroke="#EF4444"/><text x="220" y="342" text-anchor="middle" font-size="8" fill="#DC2626" font-weight="600">+ ε (optional noise)</text>
  <text x="160" y="372" text-anchor="middle" font-size="9" fill="#64748B">Each expert duplicated once</text>
  <text x="160" y="388" text-anchor="middle" font-size="9" fill="#64748B">512 → 1024 routed experts</text>
  <text x="160" y="404" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">Total params doubled</text>

  <rect x="310" y="226" width="260" height="190" rx="10" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="440" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#5B21B6">② Router Weight Expansion</text>
  <rect x="335" y="264" width="72" height="72" rx="4" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.2"/><text x="371" y="296" text-anchor="middle" font-size="9" fill="#5B21B6">W</text><text x="371" y="310" text-anchor="middle" font-size="8" fill="#7C3AED">[E, d]</text>
  <text x="371" y="350" text-anchor="middle" font-size="9" fill="#64748B">Original</text>
  <line x1="412" y1="300" x2="438" y2="300" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="442" y="264" width="72" height="36" rx="4" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.2"/><text x="478" y="286" text-anchor="middle" font-size="8" fill="#5B21B6">W (orig rows)</text>
  <rect x="442" y="300" width="72" height="36" rx="4" fill="url(#noise)" stroke="#EF4444" stroke-width="1.2"/><rect x="442" y="300" width="72" height="36" rx="4" fill="#EDE9FE" stroke="#EF4444" stroke-width="1.2" opacity=".7"/><text x="478" y="322" text-anchor="middle" font-size="8" fill="#DC2626">W + ε (new)</text>
  <text x="478" y="350" text-anchor="middle" font-size="9" fill="#64748B">Expanded</text><text x="528" y="300" font-size="8" fill="#64748B">[2E, d]</text>
  <text x="440" y="386" text-anchor="middle" font-size="9" fill="#64748B">Router dim: E → 2E</text>
  <text x="440" y="402" text-anchor="middle" font-size="9" font-weight="600" fill="#DC2626">Noise breaks symmetry</text>

  <rect x="590" y="226" width="270" height="190" rx="10" fill="#F0FDF4" stroke="#BBF7D0"/>
  <text x="725" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">③ Key Advantage</text>
  <text x="725" y="280" text-anchor="middle" font-size="13" font-weight="600" fill="#0F172A">Top-K Unchanged</text>
  <text x="725" y="304" text-anchor="middle" font-size="10" fill="#475569">Before: Top-12 / 512</text>
  <text x="725" y="322" text-anchor="middle" font-size="10" fill="#475569">After:  Top-12 / 1024</text>
  <line x1="660" y1="336" x2="790" y2="336" stroke="#D1FAE5"/>
  <text x="725" y="360" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">Inference FLOPs ≈ Same</text>
  <text x="725" y="382" text-anchor="middle" font-size="10" fill="#475569">Each token still activates K</text>
  <text x="725" y="400" text-anchor="middle" font-size="10" fill="#475569">Total params doubled (storage↑)</text>

  <!-- ==================== Section 3: Index Layout ==================== -->
  <line x1="40" y1="432" x2="860" y2="432" stroke="#CBD5E1" stroke-dasharray="6,4"/>
  <text x="450" y="458" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Expanded Index Layout — Router Dim [1536]</text>
  <g transform="translate(50,472)">
    <rect x="0" y="0" width="195" height="32" rx="4" fill="#3B82F6"/><text x="97" y="21" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Orig Routed [0–511]</text>
    <rect x="195" y="0" width="195" height="32" rx="4" fill="#F97316"/><text x="292" y="21" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Copied Routed [512–1023]</text>
    <rect x="390" y="0" width="195" height="32" rx="4" fill="#CBD5E1"/><text x="487" y="21" text-anchor="middle" font-size="10" fill="#475569" font-weight="600">Orig Zero [1024–1279]</text>
    <rect x="585" y="0" width="195" height="32" rx="4" fill="#E2E8F0"/><text x="682" y="21" text-anchor="middle" font-size="10" fill="#64748B" font-weight="600">Copied Zero [1280–1535]</text>
  </g>
  <g transform="translate(50,516)">
    <path d="M0,-6 L0,-14 L390,-14 L390,-6" stroke="#3B82F6" stroke-width="1.2" fill="none"/><text x="195" y="2" text-anchor="middle" font-size="9" fill="#1E40AF">n_routed_experts = 1024</text>
    <path d="M390,-6 L390,-20 L780,-20 L780,-6" stroke="#94A3B8" stroke-width="1.2" fill="none"/><text x="585" y="2" text-anchor="middle" font-size="9" fill="#64748B">zero_expert_num = 512</text>
  </g>
  <g transform="translate(80,542)">
    <rect x="0" y="0" width="14" height="10" rx="2" fill="#3B82F6"/><text x="20" y="10" font-size="9" fill="#475569">Original</text>
    <rect x="110" y="0" width="14" height="10" rx="2" fill="url(#ig)" stroke="#F97316" stroke-width="1"/><text x="130" y="10" font-size="9" fill="#475569">Copy (+noise)</text>
    <rect x="250" y="0" width="14" height="10" rx="2" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/><text x="270" y="10" font-size="9" fill="#475569">Router</text>
    <rect x="350" y="0" width="14" height="10" rx="2" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/><text x="370" y="10" font-size="9" fill="#475569">Zero Expert (exact, no noise)</text>
  </g>
</svg>
