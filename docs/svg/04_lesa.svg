    <rect x="0" y="46" width="90" height="34" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2" filter="url(#sh)"/><text x="45" y="68" text-anchor="middle" font-size="11" fill="#1E40AF" font-weight="600">Layer i+1</text>
    <line x1="90" y1="17" x2="125" y2="32" stroke="#64748B" stroke-width="1.2"/><text x="104" y="16" font-size="9" fill="#94A3B8" font-weight="600">SVD</text>
    <line x1="90" y1="63" x2="125" y2="48" stroke="#64748B" stroke-width="1.2"/><text x="104" y="72" font-size="9" fill="#94A3B8" font-weight="600">SVD</text>
    <rect x="127" y="22" width="120" height="36" rx="6" fill="#3B82F6" filter="url(#sh)"/><text x="187" y="38" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">Predictor Net</text><text x="187" y="52" text-anchor="middle" font-size="9" fill="#BFDBFE">lightweight</text>
    <line x1="247" y1="40" x2="275" y2="40" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="277" y="24" width="90" height="32" rx="6" fill="#10B981" filter="url(#sh)"/><text x="322" y="45" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">W_new</text>
    <line x1="367" y1="40" x2="395" y2="40" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="397" y="6" width="150" height="68" rx="8" fill="#F8FAFC" stroke="#10B981" stroke-width="1.5"/>
    <text x="472" y="28" text-anchor="middle" font-size="10" fill="#64748B">Layer i</text>
    <text x="472" y="46" text-anchor="middle" font-size="13" fill="#10B981" font-weight="700">↓ New Layer ↓</text>
    <text x="472" y="62" text-anchor="middle" font-size="10" fill="#64748B">Layer i+1</text>
    <text x="598" y="34" font-size="10" fill="#D97706" font-weight="600">Approx FP</text>
    <text x="598" y="50" font-size="10" fill="#D97706">Acc: 80-90%</text>
    <text x="598" y="66" font-size="10" fill="#475569">Fastest convergence</text>
