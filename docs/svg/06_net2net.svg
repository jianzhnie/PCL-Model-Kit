<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 130" font-family="system-ui,-apple-system,sans-serif">
<defs>
  <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#64748B"/></marker>
  <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#10B981"/></marker>
  <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#EF4444"/></marker>
  <linearGradient id="ig" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF7ED"/><stop offset="100%" stop-color="#FFEDD5"/></linearGradient>
  <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
</defs>

  <text x="390" y="24" text-anchor="middle" font-size="17" font-weight="700" fill="#0F172A">Net2Net — Classic Function-Preserving Transforms</text>
  <line x1="170" y1="36" x2="610" y2="36" stroke="#CBD5E1"/>
  <rect x="20" y="46" width="360" height="72" rx="10" fill="#FEF2F2" stroke="#FECACA" filter="url(#sh)"/>
  <text x="200" y="66" text-anchor="middle" font-size="11" fill="#991B1B" font-weight="700">Net2WiderNet</text>
  <g transform="translate(40,76)">
    <rect x="0" y="0" width="90" height="26" rx="4" fill="#DBEAFE" stroke="#3B82F6"/><text x="45" y="18" text-anchor="middle" font-size="9" fill="#1E40AF">W_in (m×n)</text>
    <line x1="90" y1="13" x2="112" y2="13" stroke="#64748B" stroke-width="1.2" marker-end="url(#ah)"/>
    <rect x="114" y="0" width="105" height="26" rx="4" fill="#EF4444"/><text x="166" y="18" text-anchor="middle" font-size="9" fill="#fff">W_in' (m×(n+k))</text>
    <text x="240" y="12" font-size="9" fill="#475569">Copy k cols;</text><text x="240" y="26" font-size="9" fill="#059669" font-weight="600">W_out' ÷ k → f(x) unchanged ✓</text>
  </g>
  <rect x="400" y="46" width="360" height="72" rx="10" fill="#EFF6FF" stroke="#BFDBFE" filter="url(#sh)"/>
  <text x="580" y="66" text-anchor="middle" font-size="11" fill="#1E40AF" font-weight="700">Net2DeeperNet</text>
  <g transform="translate(420,76)">
    <rect x="0" y="0" width="70" height="26" rx="4" fill="#3B82F6"/><text x="35" y="18" text-anchor="middle" font-size="9" fill="#fff">Layer i</text>
    <line x1="70" y1="13" x2="90" y2="13" stroke="#64748B" stroke-width="1.2" marker-end="url(#ah)"/>
    <rect x="92" y="0" width="80" height="26" rx="4" fill="#10B981"/><text x="132" y="18" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">New = Identity</text>
    <line x1="172" y1="13" x2="192" y2="13" stroke="#64748B" stroke-width="1.2" marker-end="url(#ah)"/>
    <rect x="194" y="0" width="76" height="26" rx="4" fill="#3B82F6"/><text x="232" y="18" text-anchor="middle" font-size="9" fill="#fff">Layer i+1</text>
    <text x="286" y="18" font-size="10" fill="#059669" font-weight="700">f(x)=x ✓</text>
  </g>

</svg>