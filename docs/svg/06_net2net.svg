<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 192" font-family="system-ui,-apple-system,sans-serif">
<defs><marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#64748B" /></marker><marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#10B981" /></marker><marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#EF4444" /></marker><marker id="ap" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#7C3AED" /></marker><linearGradient id="ig" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF7ED" /><stop offset="100%" stop-color="#FFEDD5" /></linearGradient><pattern id="noise" width="6" height="6" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r=".7" fill="#EF4444" opacity=".5" /><circle cx="4" cy="4" r=".7" fill="#EF4444" opacity=".5" /></pattern><pattern id="zp" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#FEF2F2" /><line x1="0" y1="8" x2="8" y2="0" stroke="#FECACA" stroke-width=".8" /></pattern><filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity=".08" /></filter></defs>

<text x="450" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">Net2Net &#8212; Classic Function-Preserving Transforms (ICLR 2016)</text><line x1="200" y1="40" x2="700" y2="40" stroke="#CBD5E1" />
<rect x="30" y="52" width="410" height="110" rx="12" fill="#FEF2F2" stroke="#FECACA" stroke-dasharray="6,3" filter="url(#sh)" />
<text x="50" y="72" font-size="10" fill="#FCA5A5" font-weight="600">NET2WIDERNET &#8212; WIDTH EXPANSION</text>
<g transform="translate(55,82)">
  <rect x="0" y="0" width="110" height="34" rx="5" fill="#DBEAFE" stroke="#3B82F6" filter="url(#sh)" /><text x="55" y="22" text-anchor="middle" font-size="10" fill="#1E40AF" font-weight="600">W_in (m&#215;n)</text>
  <line x1="110" y1="17" x2="138" y2="17" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)" /><text x="124" y="10" font-size="8" fill="#94A3B8">copy k cols</text>
  <rect x="140" y="0" width="130" height="34" rx="5" fill="#EF4444" filter="url(#sh)" /><text x="205" y="22" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">W_in' (m&#215;(n+k))</text>
  <rect x="0" y="42" width="370" height="24" rx="5" fill="#F8FAFC" stroke="#E2E8F0" />
  <text x="185" y="59" text-anchor="middle" font-size="10" fill="#475569">W_out copies k rows &#247; k &#8594; <tspan fill="#059669" font-weight="700">W_out'&#183;W_in' = W_out&#183;W_in &#10003;</tspan></text>
</g>
<rect x="460" y="52" width="410" height="110" rx="12" fill="#EFF6FF" stroke="#BFDBFE" stroke-dasharray="6,3" filter="url(#sh)" />
<text x="480" y="72" font-size="10" fill="#93C5FD" font-weight="600">NET2DEEPERNET &#8212; DEPTH EXPANSION</text>
<g transform="translate(490,82)">
  <rect x="0" y="0" width="80" height="34" rx="5" fill="#3B82F6" filter="url(#sh)" /><text x="40" y="22" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Layer i</text>
  <line x1="80" y1="17" x2="105" y2="17" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)" />
  <rect x="107" y="0" width="100" height="34" rx="5" fill="#10B981" filter="url(#sh)" /><text x="157" y="22" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">New = Identity</text>
  <line x1="207" y1="17" x2="232" y2="17" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)" />
  <rect x="234" y="0" width="80" height="34" rx="5" fill="#3B82F6" filter="url(#sh)" /><text x="274" y="22" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Layer i+1</text>
  <rect x="0" y="42" width="370" height="24" rx="5" fill="#F8FAFC" stroke="#E2E8F0" />
  <text x="185" y="59" text-anchor="middle" font-size="10" fill="#475569">Insert layer where f(x) = x &#8594; <tspan fill="#059669" font-weight="700">Entire network output unchanged &#10003;</tspan></text>
</g>
</svg>