<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" font-family="system-ui,-apple-system,sans-serif">
<defs>
  <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#64748B"/></marker>
  <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#10B981"/></marker>
  <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#EF4444"/></marker>
  <linearGradient id="ig" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF7ED"/><stop offset="100%" stop-color="#FFEDD5"/></linearGradient>
  <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
</defs>

  <text x="400" y="24" text-anchor="middle" font-size="17" font-weight="700" fill="#0F172A">SOLAR DUS — Depth Up-Scaling via Layer Overlap</text>
  <line x1="160" y1="36" x2="640" y2="36" stroke="#CBD5E1"/>
  <g transform="translate(20,50)">
    <rect x="0" y="0" width="68" height="36" rx="5" fill="#94A3B8" filter="url(#sh)"/><text x="34" y="23" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Embed</text>
    <line x1="68" y1="18" x2="82" y2="18" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="84" y="0" width="80" height="36" rx="5" fill="#93C5FD" filter="url(#sh)"/><text x="124" y="23" text-anchor="middle" font-size="10" fill="#1E3A5F" font-weight="600">L0–L7</text>
    <line x1="164" y1="18" x2="178" y2="18" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="180" y="0" width="110" height="36" rx="5" fill="#3B82F6" filter="url(#sh)"/><text x="235" y="16" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">L8–L23</text><text x="235" y="30" text-anchor="middle" font-size="9" fill="#BFDBFE">Upper</text>
    <line x1="290" y1="18" x2="304" y2="18" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="306" y="0" width="110" height="36" rx="5" fill="#EF4444" filter="url(#sh)"/><text x="361" y="16" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">L8'–L23'</text><text x="361" y="30" text-anchor="middle" font-size="9" fill="#FECACA">Overlap Copy</text>
    <line x1="416" y1="18" x2="430" y2="18" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="432" y="0" width="110" height="36" rx="5" fill="#3B82F6" filter="url(#sh)"/><text x="487" y="16" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">L24–L31</text><text x="487" y="30" text-anchor="middle" font-size="9" fill="#BFDBFE">Lower</text>
    <line x1="542" y1="18" x2="556" y2="18" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="558" y="0" width="80" height="36" rx="5" fill="#94A3B8" filter="url(#sh)"/><text x="598" y="23" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">LM Head</text>
    <rect x="646" y="0" width="120" height="36" rx="5" fill="#FEE2E2" stroke="#EF4444" stroke-dasharray="5,3"/>
    <text x="706" y="16" text-anchor="middle" font-size="9" fill="#DC2626" font-weight="700">NOT Func-Preserving</text>
    <text x="706" y="30" text-anchor="middle" font-size="9" fill="#DC2626">Acc: 50-80%</text>
  </g>
  <path d="M200,90 L200,100 L416,100 L416,90" stroke="#EF4444" stroke-width="1.5" fill="none"/>
  <text x="308" y="116" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="600">Overlap Zone — minimizes distribution shift</text>

</svg>