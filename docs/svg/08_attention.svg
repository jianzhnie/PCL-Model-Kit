<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 192" font-family="system-ui,-apple-system,sans-serif">
<defs><marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#64748B" /></marker><marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#10B981" /></marker><marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#EF4444" /></marker><marker id="ap" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#7C3AED" /></marker><linearGradient id="ig" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF7ED" /><stop offset="100%" stop-color="#FFEDD5" /></linearGradient><pattern id="noise" width="6" height="6" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r=".7" fill="#EF4444" opacity=".5" /><circle cx="4" cy="4" r=".7" fill="#EF4444" opacity=".5" /></pattern><pattern id="zp" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#FEF2F2" /><line x1="0" y1="8" x2="8" y2="0" stroke="#FECACA" stroke-width=".8" /></pattern><filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity=".08" /></filter></defs>

<text x="450" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">Attention Mechanism Upgrade &#8212; MHA / GQA / MLA</text><line x1="200" y1="40" x2="700" y2="40" stroke="#CBD5E1" />
<rect x="40" y="56" width="240" height="90" rx="12" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#sh)" />
<text x="160" y="82" text-anchor="middle" font-size="15" fill="#1E40AF" font-weight="700">MHA</text>
<text x="160" y="102" text-anchor="middle" font-size="10" fill="#475569">Independent K/V per head</text>
<text x="160" y="120" text-anchor="middle" font-size="10" fill="#475569">Q1-K1V1, Q2-K2V2, ...</text>
<text x="160" y="138" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="600">KV Cache: Large</text>
<line x1="280" y1="101" x2="328" y2="101" stroke="#64748B" stroke-width="2.5" marker-end="url(#ah)" />
<rect x="330" y="56" width="240" height="90" rx="12" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5" filter="url(#sh)" />
<text x="450" y="82" text-anchor="middle" font-size="15" fill="#047857" font-weight="700">GQA</text>
<text x="450" y="102" text-anchor="middle" font-size="10" fill="#475569">Multi Q heads share K/V group</text>
<text x="450" y="120" text-anchor="middle" font-size="10" fill="#475569">(Q1,Q2)-KV1, (Q3,Q4)-KV2</text>
<text x="450" y="138" text-anchor="middle" font-size="11" fill="#059669" font-weight="600">KV Cache: Reduced</text>
<line x1="570" y1="101" x2="618" y2="101" stroke="#64748B" stroke-width="2.5" marker-end="url(#ah)" />
<rect x="620" y="56" width="240" height="90" rx="12" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5" filter="url(#sh)" />
<text x="740" y="82" text-anchor="middle" font-size="15" fill="#991B1B" font-weight="700">MLA</text>
<text x="740" y="102" text-anchor="middle" font-size="10" fill="#475569">K/V compressed to latent vector</text>
<text x="740" y="120" text-anchor="middle" font-size="10" fill="#475569">Q&#8594;compress&#8594;cache&#8594;decompress</text>
<text x="740" y="138" text-anchor="middle" font-size="11" fill="#059669" font-weight="700">KV Cache: Minimal</text>
<line x1="60" y1="162" x2="840" y2="162" stroke="#10B981" stroke-width="3" marker-end="url(#ag)" />
<text x="450" y="158" text-anchor="middle" font-size="12" fill="#10B981" font-weight="700">KV Cache decreasing &#8594; Inference efficiency increasing &#8594;</text>
</svg>