<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#64748B"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#DC2626"/></marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity=".08"/></filter>
    <pattern id="zp" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#FEF2F2"/><line x1="0" y1="8" x2="8" y2="0" stroke="#FECACA" stroke-width=".8"/></pattern>
  </defs>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">M3: Expert Internal Width Expansion — Zero-Pad Growth</text>
  <line x1="140" y1="44" x2="760" y2="44" stroke="#CBD5E1"/>

  <!-- ==================== Section 1: Original Expert FFN ==================== -->
  <text x="450" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Original Expert FFN (intermediate_size = h)</text>

  <rect x="60" y="86" width="780" height="80" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-dasharray="6,3"/>
  <text x="78" y="104" font-size="10" fill="#94A3B8" font-weight="600">ORIGINAL EXPERT</text>
  <g transform="translate(100,110)">
    <rect x="0" y="0" width="80" height="36" rx="5" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#sh)"/><text x="40" y="14" text-anchor="middle" font-size="9" fill="#1E40AF">input</text><text x="40" y="28" text-anchor="middle" font-size="10" fill="#1E40AF" font-weight="600">d</text>
    <line x1="80" y1="18" x2="100" y2="18" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="102" y="0" width="120" height="36" rx="5" fill="#DBEAFE" stroke="#3B82F6" filter="url(#sh)"/><text x="162" y="14" text-anchor="middle" font-size="10" fill="#1E40AF" font-weight="600">gate_proj</text><text x="162" y="28" text-anchor="middle" font-size="9" fill="#3B82F6">d → h</text>
    <line x1="222" y1="18" x2="242" y2="18" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="244" y="0" width="90" height="36" rx="5" fill="#F1F5F9" stroke="#94A3B8" filter="url(#sh)"/><text x="289" y="23" text-anchor="middle" font-size="11" fill="#475569">SwiGLU</text>
    <line x1="334" y1="18" x2="354" y2="18" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="356" y="0" width="120" height="36" rx="5" fill="#DBEAFE" stroke="#3B82F6" filter="url(#sh)"/><text x="416" y="14" text-anchor="middle" font-size="10" fill="#1E40AF" font-weight="600">down_proj</text><text x="416" y="28" text-anchor="middle" font-size="9" fill="#3B82F6">h → d</text>
    <line x1="476" y1="18" x2="496" y2="18" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="498" y="0" width="80" height="36" rx="5" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#sh)"/><text x="538" y="14" text-anchor="middle" font-size="9" fill="#1E40AF">output</text><text x="538" y="28" text-anchor="middle" font-size="10" fill="#1E40AF" font-weight="600">d</text>
  </g>

  <!-- ==================== Expansion Arrow ==================== -->
  <line x1="450" y1="172" x2="450" y2="200" stroke="#DC2626" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="520" y="192" font-size="12" fill="#DC2626" font-weight="700">h → h' (zero-pad new dimensions)</text>

  <!-- ==================== Section 2: Expanded Expert FFN ==================== -->
  <text x="450" y="224" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Expanded Expert FFN (intermediate_size = h'  &gt;  h)</text>

  <rect x="60" y="238" width="780" height="80" rx="10" fill="#FEF2F2" stroke="#FECACA" stroke-dasharray="6,3"/>
  <text x="78" y="256" font-size="10" fill="#FCA5A5" font-weight="600">EXPANDED EXPERT</text>
  <g transform="translate(100,262)">
    <rect x="0" y="0" width="80" height="36" rx="5" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#sh)"/><text x="40" y="14" text-anchor="middle" font-size="9" fill="#1E40AF">input</text><text x="40" y="28" text-anchor="middle" font-size="10" fill="#1E40AF" font-weight="600">d</text>
    <line x1="80" y1="18" x2="100" y2="18" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
    <!-- gate_proj: original part + zero-padded part -->
    <rect x="102" y="0" width="80" height="36" rx="5" fill="#DBEAFE" stroke="#3B82F6" filter="url(#sh)"/><text x="142" y="23" text-anchor="middle" font-size="9" fill="#1E40AF">d→h (orig)</text>
    <rect x="182" y="0" width="60" height="36" rx="5" fill="url(#zp)" stroke="#EF4444" stroke-width="1.5"/><text x="212" y="16" text-anchor="middle" font-size="8" fill="#DC2626" font-weight="700">zeros</text><text x="212" y="30" text-anchor="middle" font-size="8" fill="#DC2626">d→Δh</text>
    <line x1="242" y1="18" x2="262" y2="18" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="264" y="0" width="90" height="36" rx="5" fill="#F1F5F9" stroke="#94A3B8" filter="url(#sh)"/><text x="309" y="23" text-anchor="middle" font-size="11" fill="#475569">SwiGLU</text>
    <line x1="354" y1="18" x2="374" y2="18" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
    <!-- down_proj: original part + zero-padded part -->
    <rect x="376" y="0" width="80" height="36" rx="5" fill="#DBEAFE" stroke="#3B82F6" filter="url(#sh)"/><text x="416" y="23" text-anchor="middle" font-size="9" fill="#1E40AF">h→d (orig)</text>
    <rect x="456" y="0" width="60" height="36" rx="5" fill="url(#zp)" stroke="#EF4444" stroke-width="1.5"/><text x="486" y="16" text-anchor="middle" font-size="8" fill="#DC2626" font-weight="700">zeros</text><text x="486" y="30" text-anchor="middle" font-size="8" fill="#DC2626">Δh→d</text>
    <line x1="516" y1="18" x2="536" y2="18" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="538" y="0" width="80" height="36" rx="5" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#sh)"/><text x="578" y="14" text-anchor="middle" font-size="9" fill="#1E40AF">output</text><text x="578" y="28" text-anchor="middle" font-size="10" fill="#1E40AF" font-weight="600">d</text>
  </g>

  <!-- ==================== Key Properties ==================== -->
  <line x1="60" y1="330" x2="840" y2="330" stroke="#CBD5E1" stroke-dasharray="6,4"/>

  <g transform="translate(80,348)">
    <rect x="0" y="0" width="220" height="26" rx="6" fill="#D1FAE5" stroke="#10B981"/>
    <text x="110" y="18" text-anchor="middle" font-size="10" fill="#047857" font-weight="700">✓ Function-Preserving</text>
    <rect x="240" y="0" width="200" height="26" rx="6" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="340" y="18" text-anchor="middle" font-size="10" fill="#475569">New dims contribute 0</text>
    <rect x="460" y="0" width="200" height="26" rx="6" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="560" y="18" text-anchor="middle" font-size="10" fill="#475569">Router unaffected (sees d)</text>
  </g>

  <!-- Legend -->
  <g transform="translate(80,344)">
  </g>
  <g transform="translate(200,344)">
  </g>
</svg>
